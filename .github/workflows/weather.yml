name: Daily Report

on:
  schedule:
    - cron: "0 8 * * *"   # 每天 8 点自动跑
  workflow_dispatch:       # 允许手动触发

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        run: python main.py config.yaml
